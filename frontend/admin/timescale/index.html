<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup time</title>

    <link rel="stylesheet" href="../../css/style.css?v=1.1">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="app.js" defer></script>
</head>
<body>
    <div class="wrapper">
        <header>
            <p class="back">Назад</p>
            <p class="save">Зберегти</p>
        </header>
    

        <h3 class="date">Субота, 23 листопада 2026</h3>
        <p class="free-time">Доступні години:</p>

        <div class="slot-canvas">
            <!-- Місце для слотів -->
        </div>

        <button class="submit add-slot-button">Додати новий слот</button>
        
        <div class="overlay"></div>
        <div class="time-window">
            <h3>Виберіть часовий проміжок</h3>

            <div class="time-picker-container">
                <div class="time-box">
                    <label>Час початку</label>
                    <input type="time" class="time-input start-time" value="09:00">
                </div>
                <span class="divider">:</span>
                <div class="time-box">
                    <label>Час закінчення</label>
                    <input type="time" class="time-input end-time" value="10:00">
                </div>
            </div>

            <button class="save-time submit">Зберегти слот</button>
        </div>
    </div>
</body>
</html>
