<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup time</title>

    <link rel="stylesheet" href="../../css/style.css?v=1.0">
    <script src="app.js" defer></script>
</head>
<body>
    <div class="wrapper">
        <header>
            <p class="back">Назад</p>
            <p class="save">Зберегти</p>
        </header>
    </div>

    <h3 class="date">Субота, 23 листопада 2026</h3>
    <p class="free-time">Доступні години:</p>

    <div class="time-boxes">
        <div class="time-box">
            <p>12:00-13:00</p>

            <label class="switch">
                <input type="checkbox" checked>
                <span class="slider"></span>
            </label>

            <button class="delete-button">
                 <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <line x1="10" y1="11" x2="10" y2="17"></line>
                    <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
            </button>
        </div>
    </div>

    <button class="submit add-slot-button">Додати новий слот</button>
</body>
</html>
