<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/airbnb.css">

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/uk.js"></script>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/calendar.css">

    <script src="main.js"></script>
</head>
<body>
    <div class="wrapper">
        <h3>Забронювати час</h3>
        <div class="calendar_container">
            <input type="text" class="calendar" placeholder="Виберіть дату">
        </div>

        <h4>Виберіть години для бронювання:</h4>
        <div class="time-period-buttons">
            <button class="segment left-s segment-active">Ранкові</button>
            <button class="segment">Денні</button>
            <button class="segment right-s">Вечірні</button>
        </div>

        <div class="time-buttons">
            <button class="time">9:00</button>
            <button class="time">10:00</button>
            <button class="time">11:00</button>
            <button class="time">12:00</button>
        </div>

        <div class="time-buttons hidden">
            <button class="time">13:00</button>
            <button class="time">14:00</button>
            <button class="time">15:00</button>
            <button class="time">16:00</button>
            <button class="time">17:00</button>
            <button class="time">18:00</button>
        </div>

        <div class="time-buttons hidden">
            <button class="time">19:00</button>
            <button class="time">20:00</button>
            <button class="time">21:00</button>
            <button class="time">22:00</button>
            <button class="time">23:00</button>
        </div>


        <input class="comment" placeholder="Введіть коментар до бронювання" type="text">
        <button class="submit unactive-button">Підтвердити бронювання</button>
    </div>
</body>
</html>
